# cargo-deny policy for the Onyx workspace.
#
# Run locally with:
#   cargo deny check
#
# CI runs `EmbarkStudios/cargo-deny-action@v2` on every push and PR; a
# policy violation here blocks merge. Tightening this file is preferable
# to loosening it — every relaxation should be a deliberate decision with
# a comment explaining why.

[graph]
# Check all targets we plausibly support. Linux is the CI runner; macOS
# arm64 is the primary development platform; Windows is included so a
# Windows-only-dep regression is caught early even if we don't test there.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = true

[output]
feature-depth = 1

# ─── Advisories ────────────────────────────────────────────────────────────
# RustSec advisory database. Vulnerabilities and yanked crates fail the
# build. Unmaintained and notice advisories warn so we notice them but
# they don't block until we triage.
[advisories]
version = 2
yanked = "deny"
# Don't fail on unmaintained advisories from deep transitive deps — we
# can't control them. Workspace-direct deps becoming unmaintained DO
# fail (so we'd notice if e.g. we picked an unmaintained crate ourselves).
unmaintained = "workspace"
ignore = [
    # RUSTSEC-2024-0436 — `paste` is unmaintained. Transitive via
    # arti-client → fs-mistrust → pwd-grp → paste. The advisory is
    # informational; the crate's existing code still works. Re-evaluate
    # when arti drops the dependency.
    { id = "RUSTSEC-2024-0436", reason = "[review by 2026-12-31] paste unmaintained; transitive via arti-client → fs-mistrust → pwd-grp. No upstream fix in arti's path yet." },

    # RUSTSEC-2023-0071 — Marvin Attack timing-side-channel on RSA
    # *decryption*. Transitive via arti-client → tor-key-forge →
    # ssh-key-fork-arti → rsa. Onyx does not use RSA anywhere on the
    # hot path: identity is Ed25519, key exchange is X25519 + ML-KEM,
    # symmetric is ChaCha20-Poly1305. Modern v3 onion services and
    # Ed25519 directory signing don't use RSA decryption either. The
    # exposure is bounded to whatever RSA-decryption paths Arti still
    # exercises internally for legacy Tor compatibility — not within
    # our threat model. No upstream `rsa` fix is available. Re-evaluate
    # when the `rsa` crate ships a constant-time PKCS#1 implementation
    # or when arti drops the transitive dependency.
    { id = "RUSTSEC-2023-0071", reason = "[review by 2026-12-31] Marvin attack on rsa 0.9 — transitive via arti; no RSA decryption on Onyx's hot path. Documented as an accepted risk in CHANGELOG." },
]

# ─── Licenses ──────────────────────────────────────────────────────────────
# Onyx itself is AGPL-3.0-or-later. We accept permissive licenses from
# deps (they're compatible with redistribution under AGPL) and reject
# unknown ones. Copyleft GPL-family deps would force re-licensing; add
# them only after deliberate review.
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    # Boost Software License 1.0 — OSI-approved, FSF-Libre, permissive.
    # Pulled in by xxhash-rust (transitive via tor-hsservice). Fully
    # AGPL-compatible for redistribution.
    "BSL-1.0",
    # Our own crates.
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.93

# Per-crate license clarifications go here if a crate's metadata is
# ambiguous (e.g., dual-licensed with file globs that cargo-deny can't
# parse automatically). Currently empty — add entries with a reason.
exceptions = []

# ─── Bans ──────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"  # tighten to "deny" once the dep set stabilises
wildcards = "deny"
# Workspace-internal `{ path = "..." }` deps without a `version = "..."`
# look like wildcards to cargo-deny. Allow them — they're crates in this
# repo, not external. Re-evaluate if/when we start publishing crates.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates we forbid outright. Empty for now; populate when we have a
# specific reason (e.g., ring vs rustls preference).
deny = []

# Allow specific duplicate versions if upstream churn forces them.
# Each entry should name the crate and explain why two versions are unavoidable.
skip = []
skip-tree = []

# ─── Sources ───────────────────────────────────────────────────────────────
# Only crates.io. No unknown registries, no random git URLs — those would
# be a supply-chain attack vector that bypasses crates.io's auditing.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

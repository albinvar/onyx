name: Release

# Triggered on tag push matching v* (e.g. v0.0.1, v0.1.0-rc.1). Builds
# release binaries for the supported targets with deterministic flags,
# computes SHA256 sums, signs the binaries + sum file with sigstore
# cosign (keyless, OIDC-bound to the workflow), uploads everything to
# a GitHub release.
#
# Infra.3: reproducible-builds + supply-chain signing. The goal is
# that a user downloading `onyx-v0.0.1-x86_64-linux` and verifying
# its sigstore signature can confirm it was built by THIS repository
# at THIS commit, by THIS workflow — not by an attacker who got
# write access to the release tab. See `RELEASES.md` for the
# verifier-side walk-through.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the build without cutting a release.
  # The signing step is skipped on workflow_dispatch (sigstore
  # would refuse the OIDC issuance for a non-tag ref anyway).
  workflow_dispatch:

# Permissions needed for sigstore cosign keyless signing via OIDC.
# `id-token: write` is the magic that lets sigstore's Fulcio CA
# issue a code-signing certificate bound to this workflow's
# identity (repo + branch/tag + workflow file path).
permissions:
  contents: write   # to create a GitHub release + attach artifacts
  id-token: write   # for sigstore keyless signing

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Reproducible-build flags. SOURCE_DATE_EPOCH pins file mtimes;
  # the cargo flags strip non-deterministic paths from the binary.
  SOURCE_DATE_EPOCH: 1700000000  # fixed; same across all matrix builds

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ''
          - target: aarch64-unknown-linux-gnu
            # Build natively on an ARM runner instead of cross-compiling.
            # The Arti dep stack pulls in ring / aws-lc-sys, whose build
            # scripts compile target C code; cross-compiling needs a full
            # cross C toolchain (CC_<target>, AR_<target>, sysroot), not
            # just the linker. A native aarch64 runner sidesteps the whole
            # class of cross-compile breakage — ring/aws-lc compile with
            # the host toolchain because the host IS the target.
            # ubuntu-24.04-arm is free for public repositories.
            runner: ubuntu-24.04-arm
            ext: ''
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: ''
          - target: x86_64-apple-darwin
            # Cross-compile the Intel-Mac binary on the Apple-Silicon
            # runner. The macos-13 (Intel) runner is deprecated and so
            # scarce that jobs sat queued for hours, wedging the whole
            # release (sign-and-release needs every target). macos-latest
            # ships the universal Apple SDK, so `cargo build --target
            # x86_64-apple-darwin` cross-compiles cleanly from arm64
            # with no extra toolchain — ring/aws-lc support the Apple
            # cross target out of the box.
            runner: macos-latest
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Reproducible release build
        env:
          # Strip absolute paths from debug info + panic messages so two
          # runners' outputs match. `--remap-path-prefix` rewrites every
          # path in the binary's metadata to a stable prefix.
          # The `-C link-arg=-s` strips the symbol table on Linux; macOS
          # uses `strip` separately.
          RUSTFLAGS: >-
            --remap-path-prefix ${{ github.workspace }}=/onyx
            --remap-path-prefix ${HOME}/.cargo=/cargo
            -C link-arg=-s
        run: |
          # --locked: refuse to update Cargo.lock; same dep set as
          # committed. --release: optimized + stripped. Every target
          # builds natively on its own runner (no cross-compilation),
          # so no per-target linker/CC env is needed.
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip + rename binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          TARGET=${{ matrix.target }}
          VERSION=${GITHUB_REF_NAME#v}
          for bin in onyx onyxd onyx-hub; do
            src="target/${TARGET}/release/${bin}${{ matrix.ext }}"
            dst="artifacts/${bin}-v${VERSION}-${TARGET}${{ matrix.ext }}"
            cp "$src" "$dst"
            # Strip symbols on macOS (RUSTFLAGS -s only covers Linux).
            if [[ "${TARGET}" == *-apple-darwin ]]; then
              strip "$dst"
            fi
            chmod 755 "$dst"
          done

      - name: Compute SHA256 sums
        shell: bash
        run: |
          cd artifacts
          # GNU sha256sum on Linux, BSD shasum -a 256 on macOS — write
          # both forms then keep the GNU-compatible one for the
          # release manifest.
          if command -v sha256sum >/dev/null; then
            sha256sum * > SHA256SUMS-${{ matrix.target }}.txt
          else
            shasum -a 256 * > SHA256SUMS-${{ matrix.target }}.txt
          fi
          cat SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onyx-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

  sign-and-release:
    name: Sign + release
    needs: build
    # Tags only; workflow_dispatch (manual test) does not sign.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: onyx-*
          merge-multiple: true

      - name: Install sigstore cosign
        uses: sigstore/cosign-installer@v3

      - name: Aggregate + sign
        shell: bash
        env:
          COSIGN_YES: "true"  # auto-confirm keyless flow (we're in CI)
        run: |
          set -euo pipefail
          cd dist
          ls -la

          # Aggregate per-target SHA256SUMS into one file so verifiers
          # only need to fetch + verify a single sum manifest.
          cat SHA256SUMS-*.txt > SHA256SUMS.txt
          sort -k 2 -o SHA256SUMS.txt SHA256SUMS.txt
          echo "── Combined SHA256SUMS:"
          cat SHA256SUMS.txt

          # Sign the combined sum manifest. Verifiers verify the
          # signature against SHA256SUMS.txt, then verify each binary's
          # hash against its line in the manifest. Two-step but signs
          # exactly one artifact (faster + cheaper than per-binary
          # sigs, and aligns with how Linux distro release sigs work).
          cosign sign-blob \
            --yes \
            --bundle SHA256SUMS.txt.cosign-bundle \
            SHA256SUMS.txt

          # Also sign each individual binary so a user who only
          # downloads one binary can verify it without the manifest
          # round-trip. Bundle format (`*.cosign-bundle`) is
          # self-contained — includes cert + sig + Rekor entry.
          for bin in onyx-v* onyxd-v* onyx-hub-v*; do
            [[ -f "$bin" ]] || continue
            echo "── Signing $bin"
            cosign sign-blob \
              --yes \
              --bundle "${bin}.cosign-bundle" \
              "$bin"
          done

          ls -la

      - name: Copy install script into release dir
        # T-install.b: ship the install script alongside the release so
        # `curl .../releases/download/v0.1.0/install.sh | bash` works,
        # and that URL is immutable (the release-tag URL doesn't change
        # like raw.githubusercontent.com/.../main/scripts/install.sh
        # would). The release tag in the URL also pins which version
        # the script will install by default when invoked without
        # ONYX_VERSION set.
        run: |
          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh
          # Sign the install script itself so a verifier can confirm it
          # was produced by this workflow. Sigstore bundle is
          # self-contained, no separate signature file.
          cosign sign-blob \
            --yes \
            --bundle dist/install.sh.cosign-bundle \
            dist/install.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        # The action intermittently hits an asset-metadata race
        # ("Not Found … present after refresh") and exits non-zero
        # AFTER uploading all assets — leaving the release as a draft.
        # Don't fail the job on that; the "Ensure published" step below
        # force-publishes. A genuine create failure still surfaces there
        # (gh release edit fails when the release doesn't exist).
        continue-on-error: true
        with:
          # Any tag with a SemVer pre-release suffix (a hyphen — e.g.
          # v0.1.0-rc.1, v0.1.0-beta) is marked as a GitHub pre-release.
          # CRITICAL: pre-releases are excluded from `/releases/latest`,
          # so the live install one-liner
          # (`.../releases/latest/download/install.sh`) keeps pointing at
          # the last STABLE release and never auto-upgrades users onto an
          # untested RC. A clean `vX.Y.Z` tag (no hyphen) is a full
          # release and does become `latest`.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/onyx-*
            dist/onyxd-*
            dist/onyx-hub-*
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.cosign-bundle
            dist/install.sh
            dist/install.sh.cosign-bundle
          generate_release_notes: true
          body: |
            ## Install (one-liner)

            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh | bash
            ```

            The script auto-detects your platform (macOS arm64/x86_64, Linux
            x86_64/aarch64), downloads + verifies the right binary, and
            installs `onyx` to `~/.local/bin`. See `INSTALL.md` for manual
            install and the security-conscious recipe (download → read →
            run).

            ## Verifying this release

            Every binary and the combined `SHA256SUMS.txt` are signed
            with [sigstore](https://www.sigstore.dev/) cosign (keyless
            via GitHub Actions OIDC). To verify a binary you
            downloaded:

            ```
            cosign verify-blob \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              --bundle onyx-${{ github.ref_name }}-x86_64-unknown-linux-gnu.cosign-bundle \
              onyx-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            ```

            Or verify the combined manifest then check the binary's hash:

            ```
            cosign verify-blob \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              --bundle SHA256SUMS.txt.cosign-bundle \
              SHA256SUMS.txt
            sha256sum -c SHA256SUMS.txt --ignore-missing
            ```

            See `RELEASES.md` in the repo for the full verifier walkthrough.

      - name: Ensure release is published + flagged latest
        # Always runs (even after the upload action's draft/metadata
        # flake). Force the release out of draft; flag `latest` only for
        # full releases (no hyphen) so a `-rc` can't hijack
        # /releases/latest. Idempotent. This is what used to be a manual
        # `gh release edit` after every cut.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            gh release edit "$tag" --draft=false
          else
            gh release edit "$tag" --draft=false --latest
          fi
          echo "published $tag"
